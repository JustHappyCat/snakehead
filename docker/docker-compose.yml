version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: seo-spider-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: seo_spider
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../docker/backup.sh:/usr/local/bin/backup.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: seo-spider-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    container_name: seo-spider-web
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/seo_spider
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NODE_ENV: production
      AUTH_TOKEN: ${AUTH_TOKEN:-change-me-in-production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 5s
      retries: 3

  worker:
    build:
      context: ../apps/worker
      dockerfile: Dockerfile
    container_name: seo-spider-worker
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/seo_spider
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "/app/healthcheck.js"]
      interval: 30s
      timeout: 5s
      retries: 3

  backup:
    image: postgres:15-alpine
    container_name: seo-spider-backup
    volumes:
      - postgres_backups:/backups
      - ../docker/backup.sh:/backup/backup.sh
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: seo_spider
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        chmod +x /backup/backup.sh
        while true; do
          /backup/backup.sh
          sleep 86400
        done
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: seo-spider-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  postgres_backups:
  caddy_data:
  caddy_config:
